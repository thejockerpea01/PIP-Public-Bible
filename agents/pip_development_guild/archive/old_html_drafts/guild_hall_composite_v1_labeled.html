      background-size: 1448px 1086px;

    }
    .sprite {
      position: absolute;
      image-rendering: auto;
      transform-origin: top left;
      pointer-events: none;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.24));
    }
    .label {
      position: absolute;
      transform: translate(-50%, -100%);
      background: rgba(255, 250, 242, 0.92);
      border: 1px solid rgba(47, 36, 31, 0.18);
      border-radius: 12px;
      padding: 6px 10px;
      color: #2f241f;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      white-space: nowrap;
    }
    .label::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -8px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(255, 250, 242, 0.92);
      filter: drop-shadow(0 1px 0 rgba(47,36,31,0.18));
