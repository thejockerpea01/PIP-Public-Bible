<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ห้องกิลด์ PIP</title>
<style>
  :root {
    --gold:#f0c66b;
    --gold-soft:#ffe7a6;
    --ink:#fff2d7;
    --window:#151d27;
    --shadow:0 22px 60px rgba(0, 0, 0, .48);
  }
  * { box-sizing:border-box; }
  html,
  body {
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:#050504;
    color:var(--ink);
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  body { user-select:none; }
  button,
  a { font:inherit; }
  .world {
    position:fixed;
    inset:0;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 48%, rgba(96, 70, 36, .25), transparent 42%),
      linear-gradient(180deg, #050504 0%, #11100d 100%);
  }
  .scene {
    position:absolute;
    left:50%;
    top:50%;
    width:min(100vw, calc(100vh * 1931 / 1086));
    height:min(100vh, calc(100vw * 1086 / 1931));
    transform:translate(-50%, -50%);
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(244, 213, 151, .16), 0 22px 70px rgba(0, 0, 0, .55);
  }
  .scene-scale {
    position:absolute;
    left:0;
    top:0;
    width:1931px;
    height:1086px;
    transform-origin:top left;
  }
  .background {
    position:absolute;
    inset:0;
    width:1931px;
    height:1086px;
    pointer-events:none;
  }
  .vignette {
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(180deg, rgba(0,0,0,.18), transparent 15%, transparent 80%, rgba(0,0,0,.32)),
      radial-gradient(circle at center, transparent 61%, rgba(0,0,0,.30));
  }
  .tip {
    position:fixed;
    left:50%;
    bottom:18px;
    z-index:14;
    transform:translateX(-50%);
    padding:7px 12px;
    border:1px solid rgba(239, 198, 106, .34);
    border-radius:999px;
    background:rgba(18, 24, 32, .58);
    color:#fff5dd;
    box-shadow:0 10px 28px rgba(0,0,0,.26);
    font-size:12px;
    font-weight:900;
    backdrop-filter:blur(6px);
    transition:opacity .18s ease, transform .18s ease;
  }
  .tip.hidden {
    opacity:0;
    transform:translate(-50%, 8px);
    pointer-events:none;
  }
  .agent {
    position:absolute;
    left:var(--x);
    top:var(--y);
    width:var(--w);
    height:var(--h);
    pointer-events:none;
  }
  .sprite-motion {
    position:absolute;
    inset:0;
    transform-origin:center bottom;
    animation:idleBreath var(--duration) ease-in-out infinite;
    will-change:transform;
  }
  .sprite-motion.lively { animation-name:idleLively; }
  .sprite-motion.steady { animation-name:idleSteady; }
  .agent-sprite {
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:100%;
    object-fit:contain;
    image-rendering:auto;
    pointer-events:none;
  }
  .hitbox {
    position:absolute;
    left:calc(var(--x) + (var(--w) - var(--hit-w)) / 2);
    top:calc(var(--y) + var(--h) - var(--hit-h));
    width:var(--hit-w);
    height:var(--hit-h);
    border:0;
    border-radius:999px;
    padding:0;
    background:transparent;
    cursor:pointer;
    z-index:80;
  }
  .highlight {
    position:absolute;
    left:calc(var(--x) + (var(--w) - var(--ring-w)) / 2);
    top:calc(var(--y) + var(--h) - var(--ring-h));
    width:var(--ring-w);
    height:var(--ring-h);
    border:2px solid rgba(255, 226, 147, .90);
    border-radius:999px;
    background:radial-gradient(circle, rgba(255, 237, 175, .18), rgba(255, 237, 175, .02) 58%, transparent 72%);
    box-shadow:0 0 0 4px rgba(255, 210, 112, .12), 0 0 24px rgba(255, 211, 112, .38);
    opacity:0;
    pointer-events:none;
    z-index:75;
    transition:opacity .14s ease, transform .14s ease;
  }
  .agent-label {
    position:absolute;
    left:calc(var(--x) + var(--label-x));
    top:calc(var(--y) + var(--label-y));
    min-width:max-content;
    transform:translate(-50%, -100%);
    padding:5px 8px;
    border:1px solid rgba(255, 225, 157, .62);
    border-radius:8px;
    color:#fff6df;
    background:rgba(13, 18, 25, .88);
    box-shadow:0 8px 18px rgba(0,0,0,.32);
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    z-index:90;
    transition:opacity .14s ease, transform .14s ease;
  }
  .agent-node.hovered .highlight,
  .agent-node.selected .highlight {
    opacity:1;
    transform:scale(1.04);
  }
  .agent-node.hovered .agent-label {
    opacity:1;
    transform:translate(-50%, -112%);
  }
  .hitbox:focus-visible {
    outline:none;
  }
  .dialogue {
    position:fixed;
    left:50%;
    bottom:24px;
    z-index:120;
    width:min(880px, calc(100vw - 28px));
    max-height:min(54vh, 540px);
    transform:translateX(-50%);
    border:2px solid rgba(239, 198, 106, .88);
    border-radius:18px;
    background:
      linear-gradient(180deg, rgba(32, 43, 57, .98), rgba(17, 24, 34, .98)),
      var(--window);
    box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,.08);
    overflow:hidden;
    opacity:0;
    pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
  }
  .dialogue.expanded {
    left:18px;
    top:18px;
    bottom:18px;
    width:min(50vw, 820px);
    max-height:calc(100vh - 36px);
    transform:translateX(-10px);
  }
  .dialogue.open {
    opacity:1;
    pointer-events:auto;
    transform:translate(-50%, -4px);
  }
  .dialogue.expanded.open {
    transform:translateX(0);
  }
  .dialogue::before {
    content:"";
    position:absolute;
    inset:7px;
    border:1px solid rgba(255, 232, 177, .20);
    border-radius:12px;
    pointer-events:none;
  }
  .dialogue-head {
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
    padding:16px 18px 11px;
    border-bottom:1px solid rgba(239, 198, 106, .28);
    background:linear-gradient(180deg, rgba(255,255,255,.06), transparent);
  }
  .dialogue-kicker {
    margin:0 0 4px;
    color:var(--gold-soft);
    font-size:12px;
    font-weight:900;
  }
  .dialogue-title {
    margin:0;
    color:#fff8e8;
    font-family:"Iowan Old Style", "Palatino Linotype", Georgia, serif;
    font-size:26px;
    line-height:1.05;
    letter-spacing:0;
  }
  .dialogue-meta {
    display:grid;
    gap:2px;
    margin-top:8px;
  }
  .dialogue-meta-line {
    margin:0;
    color:#f0dcc4;
    font-size:13px;
    font-weight:800;
    line-height:1.35;
  }
  .dialogue-controls {
    display:flex;
    align-items:flex-start;
    gap:8px;
  }
  .icon {
    width:18px;
    height:18px;
    flex:0 0 auto;
    stroke:currentColor;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
  }
  .icon-btn {
    display:inline-grid;
    place-items:center;
    padding:0;
    appearance:none;
    color:#fff8e8;
    background:rgba(0,0,0,.18);
    cursor:pointer;
  }
  .icon-btn svg {
    width:18px;
    height:18px;
  }
  .expand-toggle {
    width:34px;
    height:34px;
    border:1px solid rgba(255, 226, 165, .42);
    border-radius:10px;
  }
  .expand-toggle .icon-collapse {
    display:none;
  }
  .expand-toggle[data-expanded="true"] .icon-expand {
    display:none;
  }
  .expand-toggle[data-expanded="true"] .icon-collapse {
    display:block;
  }
  .expand-toggle:hover,
  .expand-toggle:focus-visible {
    outline:none;
    border-color:rgba(255, 226, 165, .90);
    background:rgba(255,255,255,.08);
  }
  .close {
    width:34px;
    height:34px;
    flex:0 0 auto;
    border:1px solid rgba(255, 226, 165, .42);
    border-radius:10px;
  }
  .close .icon {
    width:18px;
    height:18px;
  }
  .close:hover,
  .close:focus-visible {
    outline:none;
    border-color:rgba(255, 226, 165, .90);
    background:rgba(255,255,255,.08);
  }
  .dialogue-body {
    padding:15px 18px 24px;
    overflow:auto;
    max-height:calc(min(54vh, 540px) - 92px);
  }
  .dialogue.expanded .dialogue-body {
    max-height:calc(100vh - 132px);
    padding-bottom:30px;
  }
  .dialogue-panel[hidden] {
    display:none;
  }
  .workflow-grid {
    display:grid;
    grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
    gap:14px;
    align-items:start;
  }
  .workflow-grid > * {
    min-height:auto;
  }
  .speech {
    border:1px solid rgba(255, 226, 165, .20);
    border-radius:14px;
    background:rgba(247, 234, 212, .08);
    padding:13px;
  }
  .role-notes {
    margin:0;
    overflow-wrap:anywhere;
  }
  .speech p {
    margin:0;
    color:#f3ddc1;
    line-height:1.56;
    font-size:14px;
  }
  .speech strong,
  .note-row dt {
    color:#fff4cf;
  }
  .note-row { margin:0 0 13px; }
  .note-row:last-child { margin-bottom:0; }
  .note-row dt {
    margin:0 0 4px;
    font-size:12px;
    font-weight:900;
  }
  .note-row dd {
    margin:0;
    color:#f0dcc4;
    line-height:1.46;
    font-size:13px;
    overflow-wrap:anywhere;
  }
  .npc-greeting {
    margin:0 0 14px;
    color:#f3ddc1;
    line-height:1.56;
    font-size:14px;
  }
  .choice-list {
    display:grid;
    gap:7px;
  }
  .back-actions {
    display:flex;
    flex-wrap:wrap;
    gap:9px;
  }
  .back-actions {
    margin-top:12px;
  }
  .choice-button {
    display:inline-flex;
    align-items:center;
    min-height:38px;
    border:1px solid rgba(255, 226, 165, .42);
    border-radius:12px;
    padding:9px 12px;
    color:#fff8e8;
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
    cursor:pointer;
    font-size:13px;
    font-weight:900;
    box-shadow:0 8px 16px rgba(0,0,0,.16);
  }
  .menu-choice {
    justify-content:flex-start;
    width:100%;
    border-color:rgba(255, 226, 165, .20);
    border-radius:0;
    border-left:0;
    border-right:0;
    padding:10px 4px;
    background:transparent;
    box-shadow:none;
    text-align:left;
  }
  .menu-choice::before {
    content:">";
    display:inline-block;
    width:18px;
    color:var(--gold-soft);
  }
  .choice-button:hover,
  .choice-button:focus-visible {
    outline:none;
    border-color:rgba(255, 226, 165, .90);
    background:rgba(255, 232, 177, .12);
  }
  .back-button {
    min-height:32px;
    margin:0 0 12px;
    border:0;
    border-radius:8px;
    padding:6px 0;
    color:var(--gold-soft);
    background:transparent;
    cursor:pointer;
    font-size:13px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .back-button:hover,
  .back-button:focus-visible {
    outline:none;
    color:#fff5dd;
  }
  .panel-title {
    margin:0 0 4px;
    color:#fff8e8;
    font-size:18px;
    font-weight:1000;
  }
  .panel-subtitle {
    margin:0 0 14px;
    color:#f0dcc4;
    font-size:13px;
    font-weight:800;
  }
  .simple-content {
    color:#f0dcc4;
    padding-bottom:6px;
  }
  .simple-section {
    margin:0 0 14px;
  }
  .simple-section:last-child {
    margin-bottom:0;
  }
  .simple-section h3 {
    margin:0 0 5px;
    color:#fff4cf;
    font-size:13px;
    line-height:1.25;
  }
  .simple-section p {
    margin:0;
    color:#f0dcc4;
    line-height:1.55;
    font-size:14px;
  }
  .prompt-box {
    width:100%;
    min-height:240px;
    border:1px solid rgba(255, 226, 165, .24);
    border-radius:12px;
    padding:12px;
    resize:vertical;
    color:#f7e6c9;
    background:rgba(0,0,0,.28);
    font:12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow:auto;
    flex:1 1 auto;
  }
  .dialogue.expanded .prompt-box {
    min-height:300px;
  }
  .prompt-card {
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:auto;
    align-self:flex-start;
    justify-self:stretch;
  }
  .dialogue.expanded .prompt-card {
    margin-top:0;
  }
  .prompt-card-head {
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .prompt-card-title {
    margin:0;
    color:#fff4cf;
    font-size:13px;
    line-height:1.4;
    font-weight:900;
  }
  .copy-icon {
    width:34px;
    height:34px;
    flex:0 0 auto;
    border:1px solid rgba(255, 226, 165, .34);
    border-radius:10px;
    background:rgba(0,0,0,.18);
    cursor:pointer;
  }
  .copy-icon:hover,
  .copy-icon:focus-visible {
    outline:none;
    border-color:rgba(255, 226, 165, .90);
    background:rgba(255,255,255,.08);
  }
  .copy-state {
    min-height:18px;
    color:var(--gold-soft);
    font-size:12px;
    font-weight:900;
  }
  .workflow-list {
    margin:0;
    padding-left:18px;
    color:#f0dcc4;
    line-height:1.48;
    font-size:13px;
    overflow-wrap:anywhere;
  }
  .workflow-list li {
    margin:0 0 5px;
    overflow-wrap:anywhere;
  }
  @keyframes idleBreath {
    0%, 100% { transform:scale(1); }
    50% { transform:scale(var(--scale)); }
  }
  @keyframes idleSteady {
    0%, 100% { transform:scale(1); }
    50% { transform:scale(var(--scale)); }
  }
  @keyframes idleLively {
    0%, 100% { transform:translateX(0) scale(1); }
    25% { transform:translateX(-1px) scale(1.004); }
    50% { transform:translateX(0) scale(var(--scale)); }
    75% { transform:translateX(1px) scale(1.004); }
  }
  @media (max-width:760px) {
    .dialogue {
      bottom:10px;
      width:calc(100vw - 16px);
      max-height:60vh;
      border-radius:15px;
    }
    .dialogue.expanded {
      left:8px;
      top:8px;
      bottom:8px;
      width:calc(100vw - 16px);
      max-height:calc(100vh - 16px);
    }
    .dialogue-head { padding:14px 14px 9px; }
    .dialogue-title { font-size:22px; }
    .dialogue-body {
      padding:12px 14px 20px;
      max-height:calc(60vh - 90px);
    }
    .dialogue.expanded .dialogue-body {
      max-height:calc(100vh - 122px);
    }
    .workflow-grid {
      grid-template-columns:1fr;
    }
    .tip {
      bottom:14px;
      font-size:12px;
    }
  }
</style>
</head>
<body>
<svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
  <symbol id="icon-close" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6 6 18" />
  </symbol>
  <symbol id="icon-back" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M14 6 8 12l6 6" />
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M20 12H8" />
  </symbol>
  <symbol id="icon-expand" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 3H3v6M15 3h6v6M9 21H3v-6M15 21h6v-6" />
  </symbol>
  <symbol id="icon-collapse" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 9h6V3M15 3v6h6M3 15h6v6M15 15v6h6" />
  </symbol>
  <symbol id="icon-copy" viewBox="0 0 24 24">
    <rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
    <rect x="4" y="4" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
  </symbol>
  <symbol id="icon-check" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m5 12 4 4 10-10" />
  </symbol>
  <symbol id="icon-info" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 17v-5" />
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 8h.01" />
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
  </symbol>
  <symbol id="icon-workflow" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M7 7h10" />
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M7 12h6" />
    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M7 17h10" />
    <circle cx="5" cy="7" r="1" fill="none" stroke="currentColor" stroke-width="2" />
    <circle cx="13" cy="12" r="1" fill="none" stroke="currentColor" stroke-width="2" />
    <circle cx="15" cy="17" r="1" fill="none" stroke="currentColor" stroke-width="2" />
  </symbol>
</svg>
<main class="world" aria-label="ห้องกิลด์แบบโต้ตอบ">
  <div class="scene" id="scene">
    <div class="scene-scale" id="sceneScale">
      <img class="background" src="backgrounds/01_guild_hall_ro_style_clean.png" alt="พื้นหลังห้องกิลด์ PIP ที่อนุมัติแล้ว">
      <div id="agentLayer"></div>
    </div>
  </div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="tip" id="tip">คลิกตัวละครเพื่อพูดคุย</div>

  <section class="dialogue" id="dialogue" aria-live="polite" aria-hidden="true">
    <div class="dialogue-head">
      <div>
        <p class="dialogue-kicker">สนทนากับเอเจนต์</p>
        <h1 class="dialogue-title" id="agentTitle">ชื่อตัวละคร</h1>
        <div class="dialogue-meta">
          <p class="dialogue-meta-line" id="agentRole">บทบาท</p>
          <p class="dialogue-meta-line" id="agentZone">พื้นที่</p>
        </div>
      </div>
      <div class="dialogue-controls">
        <button class="expand-toggle icon-btn" type="button" id="expandDialogue" title="ขยาย" aria-label="ขยาย">
          <svg class="icon icon-expand" aria-hidden="true"><use href="#icon-expand"></use></svg>
          <svg class="icon icon-collapse" aria-hidden="true"><use href="#icon-collapse"></use></svg>
        </button>
        <button class="close icon-btn" type="button" id="closeDialogue" title="ปิดกล่องสนทนา" aria-label="ปิดกล่องสนทนา">
          <svg class="icon" aria-hidden="true"><use href="#icon-close"></use></svg>
        </button>
      </div>
    </div>
    <div class="dialogue-body">
      <div class="dialogue-panel" id="menuPanel">
        <p class="npc-greeting" id="agentGreeting"></p>
        <div class="choice-list">
          <button class="choice-button menu-choice" type="button" id="showRoleButton">ดูหน้าที่ของเอเจนต์นี้</button>
          <button class="choice-button menu-choice" type="button" id="showWorkflowButton">สั่งงานเอเจนต์นี้</button>
        </div>
      </div>

      <div class="dialogue-panel" id="rolePanel" hidden>
        <button class="back-button" type="button" id="roleBackToMenuButton">
          <svg class="icon" aria-hidden="true"><use href="#icon-back"></use></svg>
          <span>ย้อนกลับ</span>
        </button>
        <h2 class="panel-title" id="roleDetailTitle"></h2>
        <p class="panel-subtitle" id="roleDetailRole"></p>
        <div class="simple-content">
          <div class="simple-section">
            <h3>รายละเอียดบทบาท</h3>
            <p id="thaiText"></p>
          </div>
          <div class="simple-section">
            <h3>หน้าที่หลัก</h3>
            <p id="responsibility"></p>
          </div>
          <div class="simple-section">
            <h3>แนวทางการใช้งาน</h3>
            <p id="usage"></p>

const agentLayer = document.getElementById("agentLayer");
const scene = document.getElementById("scene");
const sceneScale = document.getElementById("sceneScale");
const dialogue = document.getElementById("dialogue");
const tip = document.getElementById("tip");
const expandDialogueButton = document.getElementById("expandDialogue");
const menuPanel = document.getElementById("menuPanel");
const rolePanel = document.getElementById("rolePanel");
const workflowPanel = document.getElementById("workflowPanel");
const agentGreeting = document.getElementById("agentGreeting");
const roleDetailTitle = document.getElementById("roleDetailTitle");
const roleDetailRole = document.getElementById("roleDetailRole");
const workflowPanelTitle = document.getElementById("workflowPanelTitle");
const workflowPanelRole = document.getElementById("workflowPanelRole");
const workflowUseFor = document.getElementById("workflowUseFor");
const workflowChecklist = document.getElementById("workflowChecklist");
const workflowPrompt = document.getElementById("workflowPrompt");
const copyState = document.getElementById("copyState");
let selectedNode = null;
let selectedAgent = null;
let dialogueExpanded = false;

function setSceneScale() {
  const rect = scene.getBoundingClientRect();
  sceneScale.style.transform = `scale(${rect.width / 1931})`;
}

function setDialoguePanel(panelName) {
  menuPanel.hidden = panelName !== "menu";
  rolePanel.hidden = panelName !== "role";
  workflowPanel.hidden = panelName !== "workflow";
  copyState.textContent = "";
}

function setDialogueExpanded(expanded) {
  dialogueExpanded = expanded;
  dialogue.classList.toggle("expanded", dialogueExpanded);
  expandDialogueButton.dataset.expanded = dialogueExpanded ? "true" : "false";
  expandDialogueButton.title = dialogueExpanded ? "ย่อกลับ" : "ขยาย";
  expandDialogueButton.setAttribute("aria-label", dialogueExpanded ? "ย่อกลับ" : "ขยาย");
}

function renderList(listNode, items) {
  listNode.innerHTML = "";
  items.forEach((item) => {
    const li = document.createElement("li");
    li.textContent = item;
    listNode.appendChild(li);
  });
}

function renderWorkflow(agent) {
  const workflow = workflowTemplates[agent.id];
  workflowPanelTitle.textContent = workflow.name;
  workflowPanelRole.textContent = `${agent.number} ${agent.thaiName}`;
  renderList(workflowUseFor, workflow.useFor);
  renderList(workflowChecklist, workflow.checklist);
  workflowPrompt.value = workflow.prompt;
}

async function copyWorkflowPrompt() {
  const promptText = workflowPrompt.value;
  try {
    await navigator.clipboard.writeText(promptText);
  } catch (error) {
    workflowPrompt.focus();
    workflowPrompt.select();
    document.execCommand("copy");
  }
  copyState.textContent = "คัดลอก Prompt แล้ว";
}

function renderAgents() {
  agentLayer.innerHTML = "";
  agents
    .slice()
    .sort((a, b) => (a.y + a.height) - (b.y + b.height))
    .forEach((agent, index) => {
      const node = document.createElement("div");
      node.className = "agent-node";
      node.dataset.agentId = agent.id;
      node.style.setProperty("--x", `${agent.x}px`);
      node.style.setProperty("--y", `${agent.y}px`);
      node.style.setProperty("--w", `${agent.width}px`);
      node.style.setProperty("--h", `${agent.height}px`);
      node.style.setProperty("--label-x", `${agent.labelOffsetX}px`);
      node.style.setProperty("--label-y", `${agent.labelOffsetY}px`);
      node.style.setProperty("--hit-w", `${agent.hitboxWidth}px`);
      node.style.setProperty("--hit-h", `${agent.hitboxHeight}px`);
      node.style.setProperty("--ring-w", `${agent.highlightWidth}px`);
      node.style.setProperty("--ring-h", `${agent.highlightHeight}px`);
      node.style.setProperty("--duration", agent.duration);
      node.style.setProperty("--scale", agent.scale);

      const z = 20 + index;
      node.innerHTML = `
        <div class="agent" style="z-index:${z};">
          <div class="sprite-motion ${agent.motion}">
            <img class="agent-sprite" src="${agent.spritePath}" alt="${agent.number} ${agent.name}">
          </div>
        </div>
        <div class="highlight"></div>
        <div class="agent-label">${agent.number} ${agent.name}</div>
        <button class="hitbox" type="button" aria-label="${agent.number} ${agent.name}"></button>
      `;
      const hitbox = node.querySelector(".hitbox");
      hitbox.addEventListener("mouseenter", () => node.classList.add("hovered"));
      hitbox.addEventListener("mouseleave", () => node.classList.remove("hovered"));
      hitbox.addEventListener("focus", () => node.classList.add("hovered"));
      hitbox.addEventListener("blur", () => node.classList.remove("hovered"));
      hitbox.addEventListener("click", (event) => {
        event.stopPropagation();
        openDialogue(agent, node);
      });
      agentLayer.appendChild(node);
    });
}

function openDialogue(agent, node) {
  if (selectedNode) selectedNode.classList.remove("selected");
  selectedNode = node;
  selectedAgent = agent;
  selectedNode.classList.add("selected");
  document.getElementById("agentTitle").textContent = `${agent.number} ${agent.thaiName}`;
  document.getElementById("agentRole").textContent = `บทบาท: ${agent.thaiRole}`;
  document.getElementById("agentZone").textContent = `พื้นที่: ${agent.zone}`;
  roleDetailTitle.textContent = `${agent.number} ${agent.thaiName}`;
  roleDetailRole.textContent = `บทบาท: ${agent.thaiRole}`;
  agentGreeting.textContent = `${agent.thaiName} พร้อมช่วยงาน เลือกหัวข้อที่ต้องการคุยได้เลย`;
  document.getElementById("thaiText").textContent = agent.thaiDescription;
  document.getElementById("responsibility").textContent = agent.thaiResponsibility;
  document.getElementById("usage").textContent = agent.thaiUsage;
  document.getElementById("rule").textContent = agent.thaiRule;
  renderWorkflow(agent);
  setDialoguePanel("menu");
  setDialogueExpanded(false);
  dialogue.classList.add("open");
  dialogue.setAttribute("aria-hidden", "false");
  tip.classList.add("hidden");
}

function closeDialogue() {
  dialogue.classList.remove("open");
  dialogue.setAttribute("aria-hidden", "true");
  if (selectedNode) {
    selectedNode.classList.remove("selected");
    selectedNode = null;
  }
  selectedAgent = null;
  setDialoguePanel("menu");
  setDialogueExpanded(false);
  tip.classList.remove("hidden");
}

document.getElementById("showRoleButton").addEventListener("click", (event) => {
  event.stopPropagation();
  setDialoguePanel("role");
});

document.getElementById("showWorkflowButton").addEventListener("click", (event) => {
  event.stopPropagation();
  setDialoguePanel("workflow");
});

document.getElementById("roleBackToMenuButton").addEventListener("click", (event) => {
  event.stopPropagation();
  setDialoguePanel("menu");
});

document.getElementById("workflowBackToMenuButton").addEventListener("click", (event) => {
  event.stopPropagation();
  setDialoguePanel("menu");
});

document.getElementById("copyPromptButton").addEventListener("click", (event) => {
  event.stopPropagation();
  copyWorkflowPrompt();
});

expandDialogueButton.addEventListener("click", (event) => {
  event.stopPropagation();
  setDialogueExpanded(!dialogueExpanded);
});

document.getElementById("closeDialogue").addEventListener("click", (event) => {
  event.stopPropagation();
  closeDialogue();
});

document.addEventListener("click", (event) => {
  if (!dialogue.classList.contains("open")) return;
  if (dialogue.contains(event.target)) return;
  if (event.target.closest(".hitbox")) return;
  closeDialogue();
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeDialogue();
});

window.addEventListener("resize", setSceneScale);
renderAgents();
setSceneScale();
</script>
